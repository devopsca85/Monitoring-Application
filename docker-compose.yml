version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: monitoring_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: monitoring_db
      SECRET_KEY: dev-secret-key-change-in-production
      CREDENTIAL_ENCRYPTION_KEY: dev-encryption-key-32bytes!
      MONITORING_ENGINE_URL: http://monitoring-engine:8001
    depends_on:
      mysql:
        condition: service_healthy

  monitoring-engine:
    build: ./monitoring-engine
    ports:
      - "8001:8001"
    environment:
      BACKEND_API_URL: http://backend:8000/api/v1

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
